version: '3.8'
services:
  backend:
    build: ./backend
    container_name: vexor-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/vexor.db:/app/vexor.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vexor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped